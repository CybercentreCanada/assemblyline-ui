auth:
  internal:
    signup:
      enabled: true
  ldap:
    enabled: true
    uri: ldap://openldap:389
    uid_field: "cn"
    bind_user: cn=admin,dc=assemblyline,dc=local
    bind_pass: admin
core:
  alerter:
    delay: 0
  metrics:
    apm_server:
      server_url: http://apm_server:8200/
    elasticsearch:
      hosts: [http://elastic:devpass@elasticsearch:9200]
    redis:
      host: redis
  redis:
    nonpersistent:
      host: redis
    persistent:
      host: redis
      port: 6379

datastore:
  hosts: [http://elastic:devpass@elasticsearch:9200]
  archive:
    enabled: true

filestore:
  cache:
    [
      "s3://al_storage_key:Ch@ngeTh!sPa33w0rd@minio:9000?s3_bucket=al-cache&use_ssl=False",
    ]
  storage:
    [
      "s3://al_storage_key:Ch@ngeTh!sPa33w0rd@minio:9000?s3_bucket=al-storage&use_ssl=False",
    ]
  archive:
    [
      "s3://al_storage_key:Ch@ngeTh!sPa33w0rd@minio:9000?s3_bucket=al-archive&use_ssl=False",
    ]

logging:
  log_to_console: true
  log_to_file: false
  log_to_syslog: false

submission:
  metadata:
    ingest:
      _default:
        test:
          validator_type: keyword
          required: true
      strict_ingest:
        test:
          validator_type: keyword
    strict_schemes:
      - strict_ingest
  profiles:
    # Profile that will enforce metadata validation
    - name: "static"
      display_name: "Static Analysis"
      params:
        type: strict_ingest
        services:
          excluded: ["Dynamic Analysis"]
      restricted_params:
        submission: ["ignore_recursion_prevention"]


ui:
  enforce_quota: false
  ai_backends:
    enabled: true
    api_connections: []
    mcp_servers:
      - name: test
        url: "http://mcp_server:8081/sse"
        transport: sse
        timeout: 30
    agent_profiles:
      - name: analyst
        description: "Test analyst agent"
        system_message: "You are a test analyst assistant."
        mcp_servers:
          - test
        max_iterations: 10
        max_tokens: 1024
      - name: triage
        description: "Read-only triage agent"
        system_message: "You read data only. No submissions."
        mcp_servers:
          - test
        excluded_tools:
          - submit_url
        max_iterations: 5
        max_tokens: 512
